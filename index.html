<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Aplikasi To-Do List Mobile - Kelola tugas harian Anda dengan mudah"
    />
    <title>To-Do List App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />

    <meta name="theme-color" content="#0f0f1a" />
    <link rel="apple-touch-icon" href="icon.png" />
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <div class="profile-section">
          <div class="avatar">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"
              />
            </svg>
          </div>
          <div class="profile-info">
            <h1 class="user-name">Mutsaqoful Fikri</h1>
            <p class="user-role">Front End Developer</p>
          </div>
        </div>
        <div class="time-section">
          <p class="current-day" id="currentDay">Senin</p>
          <p class="current-date" id="currentDate">23 Desember 2025</p>
        </div>
      </header>

      <main class="main-content">
        <section class="input-section">
          <h2 class="section-title">Tambah Tugas Baru</h2>
          <form id="taskForm" class="task-form">
            <div class="form-group">
              <textarea
                id="taskInput"
                class="task-input"
                placeholder="Tuliskan tugas Anda di sini..."
                rows="3"
                required
              ></textarea>
            </div>

            <!-- Sub-Task Builder -->
            <div class="form-group subtask-builder" id="subtaskBuilder">
              <div class="subtask-inputs" id="subtaskInputs">
                <!-- Dynamic subtask inputs will appear here -->
              </div>
              <button type="button" class="add-subtask-btn" id="addSubtaskBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 4v16m8-8H4"/>
                </svg>
                Tambah Sub Tugas
              </button>
            </div>

            <div class="form-group">
              <label class="priority-label">Level Prioritas:</label>
              <div class="priority-selector">
                <input
                  type="radio"
                  id="priorityLow"
                  name="priority"
                  value="low"
                  checked
                />
                <label for="priorityLow" class="priority-btn priority-low">
                  <span class="priority-dot"></span>
                  Low
                </label>

                <input
                  type="radio"
                  id="priorityMedium"
                  name="priority"
                  value="medium"
                />
                <label
                  for="priorityMedium"
                  class="priority-btn priority-medium"
                >
                  <span class="priority-dot"></span>
                  Medium
                </label>

                <input
                  type="radio"
                  id="priorityHigh"
                  name="priority"
                  value="high"
                />
                <label for="priorityHigh" class="priority-btn priority-high">
                  <span class="priority-dot"></span>
                  High
                </label>
              </div>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="currentColor"
                width="20"
                height="20"
              >
                <path
                  d="M12 4v16m8-8H4"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  fill="none"
                />
              </svg>
              Tambah Tugas
            </button>
          </form>
        </section>

        <section class="todo-section">
          <div class="section-header">
            <h2 class="section-title">
              <span class="title-icon">📋</span>
              To Do
              <span class="task-count" id="todoCount">0</span>
            </h2>
          </div>
          <div class="task-list" id="todoList">
            <div class="empty-state" id="emptyTodo">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path
                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
                />
              </svg>
              <p>Belum ada tugas</p>
              <span>Tambahkan tugas baru di atas</span>
            </div>
          </div>
        </section>

        <section class="done-section">
          <div class="section-header">
            <h2 class="section-title">
              <span class="title-icon">✅</span>
              Done
              <span class="task-count done-count" id="doneCount">0</span>
            </h2>
          </div>
          <div class="task-list" id="doneList">
            <div class="empty-state" id="emptyDone">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <p>Belum ada tugas selesai</p>
              <span>Selesaikan tugas dengan klik checkbox</span>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <button class="delete-all-btn" id="deleteAllBtn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            width="18"
            height="18"
          >
            <path
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              fill="none"
            />
          </svg>
          Hapus Semua
        </button>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
